name: "CodeQL"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 1 * * 2'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # Action v4 continues to support these languages
        language: ['python']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # Updated from v2
      with:
        fetch-depth: 0 # Recommended for better deep analysis

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4 # Use @v3 or @v4
      with:
        languages: ${{ matrix.language }}
        # New Feature: build-mode can simplify analysis for many languages
        # build-mode: none 

    # Autobuild is still supported but version must be updated
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3